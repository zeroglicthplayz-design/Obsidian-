services:
  - type: web
    name: obsidian-marketplace-bot
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install discord.py>=2.3.0
      pip install python-dotenv>=1.0.0
      pip install Flask>=3.0.0
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
    region: oregon
