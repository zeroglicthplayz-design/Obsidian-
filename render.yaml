# OPTION 1: Background Worker (Free tier - sleeps after 15 min)
# Use this if you upgrade to paid ($7/month)
services:
  - type: worker
    name: obsidian-marketplace-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
    region: oregon

